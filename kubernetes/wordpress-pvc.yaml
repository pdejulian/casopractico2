# =============================================================================
# wordpress-pvc.yaml - Peticion de almacenamiento persistente para WordPress
# =============================================================================
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  namespace: default
  name: wordpress-pvc
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: managed-csi
  resources:
    requests:
      storage: 1Gi
